<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/Document.png" alt="logo">
        </div>
       
        <div class="form">

            <form action="#" method="post">
                 <div class="steps">
                    <a href="../DataBasic/index.html" class="step">1</a>
                    <a href="../DataFinancial/financeiro.html" class="step">2</a>
                    <a href="../DataAddress/address.html" class="step">3</a>
                    <div class="step  active">4</div>
                    <div class="step">5</div>
                </div>
            
                <div class="form-header">

                    <div class="title">
                        <h1>Dados de segurança</h1>
                    </div>

                <div class="form-logo">
                    <img src="assets/img/LogoFundo.png" alt="logo">
                </div>
       

                </div>


                <div class="input-group">

                    <div class="input-box">
                        <label for="senha">Senha:</label>
                        <input 
                            id="senha"
                            name="rua"
                            type="password"
                            placeholder="Digite sua melhor senha..."
                            required>
                    
                    </div>
                     <div class="input-box">
                        <label for="confirma">Confirmar senha:</label>
                        <input 
                            id="confirma"
                            name="confirma"
                            type="password"
                            placeholder="Confirme sua senha!"
                            required
                        >
                                   </div>
                <div class="navigation-buttons">

                    <button
                        type="button"
                        onclick="history.back()">
                        Voltar
                    </button>

                    <button
                        type="button"
                        onclick="window.location.href='../DataSecurity/seguranca.html'">
                        Próximo
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
