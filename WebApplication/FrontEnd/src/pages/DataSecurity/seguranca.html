<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/Document.png" alt="logo">
        </div>

        <div class="form">

            <form id="step4">

                <div class="steps">
                    <a href="../DataBasic/index.html" class="step">1</a>
                    <a href="../DataFinancial/financeiro.html" class="step">2</a>
                    <a href="../DataAddress/address.html" class="step">3</a>
                    <div class="step active">4</div>
                    <div class="step">5</div>
                </div>

                <div class="form-header">

                    <div class="title">
                        <h1>Security Data</h1>
                    </div>

                    <div class="form-logo">
                        <img src="assets/img/LogoFundo.png" alt="logo">
                    </div>

                </div>

                <div class="input-group">

                    <div class="input-box">
                        <label for="senha">Password:</label>
                        <input id="senha" name="senha" type="password"
                            placeholder="Enter your best password..." required>
                    </div>

                    <div class="input-box">
                        <label for="confirma">Confirm Password:</label>
                        <input id="confirma" name="confirmaSenha" type="password"
                            placeholder="Confirm your password!" required>
                    </div>

                </div>

                <div class="navigation-buttons">

                    <button type="button" onclick="history.back()">
                        Back
                    </button>

                    <div class="login-button">
                        <button type="button" id="btnNext">Submit</button>
                    </div>

                </div>

            </form>

        </div>

    </div>

    <script src="dataSecurity.js"></script>

</body>

</html>
