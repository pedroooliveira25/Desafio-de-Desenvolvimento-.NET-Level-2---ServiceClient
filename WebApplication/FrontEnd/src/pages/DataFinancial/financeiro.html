<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/LogoFu.png" alt="logo">
        </div>
       
        <div class="form">

            <form action="#" method="post">
                 <div class="steps">
                    <div class="step active">1</div>
                    <div class="step">2</div>
                    <div class="step">3</div>
                    <div class="step">4</div>
                    <div class="step">5</div>
                </div>
            
                <div class="form-header">

                    <div class="title">
                        <h1>Dados Financeiros</h1>
                    </div>

                <div class="form-logo">
                    <img src="assets/img/LogoFundo.png" alt="logo">
                </div>
       

                </div>

                 <div class="login-button">
                        <button type="button">Próximo</button>
                </div>

                <div class="input-group">

                    <div class="input-box">
                        <label for="name">Patrimônio:</label>
                        <input 
                            id="name"
                            name="name"
                            type="text"
                            placeholder="Digite seu patrimônio"
                            required
                        >
                    </div>

                    <div class="input-box">
                        <label for="cpf">Renda:</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
