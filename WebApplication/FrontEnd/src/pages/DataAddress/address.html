<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/19197147.png" alt="logo">
        </div>
       
        <div class="form">

            <form action="#" method="post">
                 <div class="steps">
                    <div class="step">1</div>
                    <div class="step active">2</div>
                    <div class="step">3</div>
                    <div class="step">4</div>
                    <div class="step">5</div>
                </div>
            
                <div class="form-header">

                    <div class="title">
                        <h1>Dados Financeiros</h1>
                    </div>

                <div class="form-logo">
                    <img src="assets/img/LogoFundo.png" alt="logo">
                </div>
       

                </div>


                <div class="input-group">

                    <div class="input-box">
                        <label for="name">Rua::</label>
                        <input 
                            id="name"
                            name="name"
                            type="text"
                            placeholder="Digite seu patrimônio"
                            required
                        >
                    </div>

                    <div class="input-box">
                        <label for="cpf">Número:</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>
                     <div class="input-box">
                        <label for="cpf">Número:</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>
                     <div class="input-box">
                        <label for="cpf">Bairro:</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>
                     <div class="input-box">
                        <label for="cpf">Cidade:</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>
                    <div class="input-box">
                        <label for="cpf">Estado::</label>
                        <input 
                            id="cpf"
                            name="cpf"
                            type="text"
                            placeholder="Digite seu renda"
                            required
                        >
                    </div>

                </div>
                <div class="navigation-buttons">

                    <button
                        type="button"
                        onclick="history.back()">
                        Voltar
                    </button>

                    <button
                        type="button"
                        onclick="window.location.href='../DataAddress/address.html'">
                        Próximo
                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
