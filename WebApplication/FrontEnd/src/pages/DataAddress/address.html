<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/mapa-3d.png" alt="logo">
        </div>

        <div class="form">

            <form id="step3">

                <div class="steps">
                    <a href="../DataBasic/index.html" class="step">1</a>
                    <a href="../DataFinancial/financeiro.html" class="step">2</a>
                    <div class="step active">3</div>
                    <div class="step">4</div>
                    <div class="step">5</div>
                </div>

                <div class="form-header">

                    <div class="title">
                        <h1>Residential Data</h1>
                    </div>

                    <div class="form-logo">
                        <img src="assets/img/LogoFundo.png" alt="logo">
                    </div>

                </div>

                <div class="input-group">

                    <div class="input-box">
                        <label for="rua">Street:</label>
                        <input id="rua" name="rua" type="text" placeholder="Enter your address..." required>
                    </div>

                    <div class="input-box">
                        <label for="numero">Number:</label>
                        <input id="numero" name="numero" type="text" placeholder="No." required>
                    </div>

                    <div class="input-box">
                        <label for="bairro">Neighborhood:</label>
                        <input id="bairro" name="bairro" type="text" placeholder="Enter your neighborhood..." required>
                    </div>

                    <div class="input-box">
                        <label for="cidade">City:</label>
                        <input id="cidade" name="cidade" type="text" placeholder="City..." required>
                    </div>

                    <div class="input-box">
                        <label for="estado">State:</label>
                        <input id="estado" name="estado" type="text" placeholder="Enter your state..." required>
                    </div>

                    <div class="input-box">
                        <label for="cep">ZIP Code:</label>
                        <input id="cep" name="cep" type="text" placeholder="Enter your ZIP code..." required>
                    </div>

                </div>

                <div class="navigation-buttons">

                    <button type="button" onclick="history.back()">
                        Back
                    </button>

                    <button type="button" id="btnNext">Next</button>

                </div>

            </form>

        </div>

    </div>

    <script src="dataAddress.js"></script>

</body>

</html>
