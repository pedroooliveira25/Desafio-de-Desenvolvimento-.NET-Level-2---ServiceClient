<!DOCTYPE html>
<html lang="pt-bt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <div class="container">
        <div class="form-image">
            <img src="assets/img/log.svg" alt="">
        </div>
        <div class="form">
            <form action="#">
                <div class="title">
                    <h1>Cadastre-se</h1>
                </div>
                <div class="login-button">
                    <button><a href="#">Entrar</a></button>
                </div>
                <div class="input-group">
                    <div class="input-box">
                        <label for="firstName">Nome</label>
                        <input id="firstname" type="text" name="firstName" placeholder="Digite seu nome completo"
                            required>
                    </div>
                    <div class="input-box">
                        <label for="lastName">Cpf</label>
                        <input id="lastname" type="text" name="lastName" placeholder="Digite seu cpf" required>
                    </div>
                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder="Digite melhor email" required>
                    </div>
                    <div class="input-box">
                        <label for="DateOfBirth">Data de Nascimento</label>
                        <input id="nascimento" type="date" name="DateOfBirth"
                            placeholder="Digite sua data de nascimento" required>
                    </div>
                    <div class="input-box">
                        <label for="Cpf">Cpf</label>
                        <input id="cpf" type="text" name="" placeholder="Digite seu CPF" required>
                    </div>
                    <div class="input-box">
                        <label for="Telefone">Telefone</label>
                        <input id="telefone" type="tel" name="" placeholder="(xx) XXXX-XXXXX" required>
                    </div>
                </div>
            </form>

        </div>

    </div>
</body>

</html>
