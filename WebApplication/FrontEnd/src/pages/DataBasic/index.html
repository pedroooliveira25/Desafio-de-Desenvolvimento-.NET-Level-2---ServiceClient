<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBasic</title>

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>

    <div class="container">

        <div class="form-image">
            <img src="assets/img/LogoFu.png" alt="logo">
        </div>

        <div class="form">

            <form id="step1">

                <div class="steps">
                    <div class="step active">1</div>
                    <div class="step">2</div>
                    <div class="step">3</div>
                    <div class="step">4</div>
                    <div class="step">5</div>
                </div>

                <div class="form-header">

                    <div class="title">
                        <h1>Sign Up</h1>
                    </div>

                    <div class="form-logo">
                        <img src="assets/img/LogoFundo.png" alt="logo">
                    </div>

                </div>

                <div class="input-group">

                    <div class="input-box">
                        <label for="name">Full Name:</label>
                        <input id="name" name="name" type="text"
                            placeholder="Enter your full name" required>
                    </div>

                    <div class="input-box">
                        <label for="cpf">CPF:</label>
                        <input id="cpf" name="cpf" type="text"
                            placeholder="Enter your CPF" required>
                    </div>

                    <div class="input-box">
                        <label for="email">Email:</label>
                        <input id="email" name="email" type="email"
                            placeholder="Enter your email" required>
                    </div>

                    <div class="input-box">
                        <label for="dateOfBirth">Date of Birth:</label>
                        <input id="dateOfBirth" name="dateOfBirth" type="date" required>
                    </div>

                    <div class="input-box">
                        <label for="phone">Phone:</label>
                        <input id="phone" name="phone" type="tel"
                            placeholder="(xx) xxxx-xxxx" required>
                    </div>

                </div>

                <div class="login-button">
                    <button id="btnCadastrar" type="button">Next</button>
                </div>

            </form>

        </div>

    </div>

    <script src="dataBasic.js"></script>

</body>

</html>
